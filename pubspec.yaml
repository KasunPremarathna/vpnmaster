name: vpn_master
description: VPN Master - Full-featured VPN and tunneling app
publish_to: 'none'
version: 1.0.8+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # SSH tunneling
  dartssh2: ^2.9.0

  # Crypto / secure storage
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  pointycastle: ^3.7.4

  # File & sharing
  file_picker: ^8.0.3
  share_plus: ^10.0.0
  path_provider: ^2.1.3

  # Charts
  fl_chart: ^0.69.0

  # Network
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.3.1

  # Misc UI
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  uuid: ^4.4.0
  intl: ^0.19.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  in_app_update: ^4.2.5
  onesignal_flutter: ^5.4.5
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/configs/
    - assets/animations/
